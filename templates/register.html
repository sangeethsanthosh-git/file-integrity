{% extends "base.html" %}

{% block title %}Register | IntegrityVault{% endblock %}

{% block content %}
<section class="auth-container">
    <div class="card auth-card">
        <form method="post" class="stacked-form auth-form" novalidate>
            <label for="username">Username</label>
            <input id="username" name="username" type="text" maxlength="32" value="{{ request.form.get('username', '') }}" required>

            <label for="password">Password</label>
            <input id="password" name="password" type="password" minlength="8" required>

            <label for="confirm_password">Confirm Password</label>
            <input id="confirm_password" name="confirm_password" type="password" minlength="8" required>

            <button type="submit" class="primary-button btn-primary">Create Account</button>
        </form>

        <p class="inline-note">
            Already registered?
            <a href="{{ url_for('login') }}">Log in instead</a>.
        </p>
    </div>
</section>
{% endblock %}
