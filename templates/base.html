<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}IntegrityVault{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <script src="{{ url_for('static', filename='js/app.js') }}" defer></script>
</head>
<body>
    <div class="site-bg"></div>
    <div class="page-shell container">
        <header class="app-header">
            <div class="app-title">
                <span class="logo">IV</span>
                <div>
                    <h1>IntegrityVault</h1>
                    <p>File Integrity Verification System</p>
                </div>
            </div>
        </header>

        <main class="main-content">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <section class="alerts" aria-live="polite">
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }}" data-alert>
                                <span>{{ message }}</span>
                                <button type="button" class="alert-close" aria-label="Dismiss message">&times;</button>
                            </div>
                        {% endfor %}
                    </section>
                {% endif %}
            {% endwith %}

            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
