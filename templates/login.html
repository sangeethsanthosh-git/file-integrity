{% extends "base.html" %}

{% block title %}Login | IntegrityVault{% endblock %}

{% block content %}
<section class="auth-form-only">
    <div class="form-panel">
        <div class="card">
            <p class="eyebrow">Sign In</p>
            <h2>Welcome back</h2>
            <p class="supporting-copy">Use your account to continue monitoring file integrity.</p>

            <form method="post" class="stacked-form" novalidate>
                <label for="username">Username</label>
                <input id="username" name="username" type="text" maxlength="32" value="{{ request.form.get('username', '') }}" required>

                <label for="password">Password</label>
                <input id="password" name="password" type="password" required>

                <button type="submit" class="primary-button">Login</button>
            </form>

            <p class="inline-note">
                Need an account?
                <a href="{{ url_for('register') }}">Create one here</a>.
            </p>
        </div>
    </div>
</section>
{% endblock %}
